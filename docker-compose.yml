services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: degreebaba_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    env_file: .env
    environment:
      PYTHONPATH: /app:/
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ingestion:/ingestion

volumes:
  pgdata:
